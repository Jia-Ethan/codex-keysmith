name: Bug report / Bug 报告
description: Report a reproducible problem / 报告可复现的问题
title: "[Bug] "
body:
  - type: markdown
    attributes:
      value: |
        请先删除 token、cookie、用户名、私人路径和完整配置内容。安全漏洞请使用 [Private vulnerability reporting](https://github.com/Jia-Ethan/codex-keysmith/security/advisories/new)，不要在这里公开。

        Remove tokens, cookies, usernames, private paths, and complete configuration files. Report vulnerabilities through [Private vulnerability reporting](https://github.com/Jia-Ethan/codex-keysmith/security/advisories/new), not here.

  - type: input
    id: keysmith-version
    attributes:
      label: codex-keysmith commit
      description: Paste the commit SHA or describe how the repository was obtained.
      placeholder: 0123456789abcdef
    validations:
      required: true

  - type: input
    id: operating-system
    attributes:
      label: 操作系统 / Operating system
      placeholder: macOS 15.5 or Ubuntu 24.04
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python 版本 / Python version
      placeholder: Python 3.13.5
    validations:
      required: true

  - type: input
    id: codex-version
    attributes:
      label: Codex CLI 版本 / Codex CLI version
      placeholder: Paste the version output
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: 复现步骤 / Reproduction steps
      description: Provide the smallest sequence that reproduces the problem.
      placeholder: |
        1. Run ...
        2. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期结果 / Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际结果 / Actual behavior
    validations:
      required: true

  - type: textarea
    id: dry-run-output
    attributes:
      label: 脱敏后的 dry-run 输出 / Redacted dry-run output
      description: Run the same command with --dry-run where applicable. Explain why it is unavailable if the failure prevents it.
      render: shell
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: 其他信息 / Additional context
      description: Add only information directly relevant to the problem.

  - type: checkboxes
    id: redaction
    attributes:
      label: 脱敏确认 / Redaction confirmation
      options:
        - label: I removed tokens, cookies, usernames, private paths, and complete configuration content. / 我已删除这些敏感信息。
          required: true
